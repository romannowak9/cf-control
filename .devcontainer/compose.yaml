services:
  workspace:
    build: .
    container_name: cf-container-era
    ipc: host
    network_mode: host
    privileged: true
    tty: true
    runtime: nvidia
    stdin_open: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    volumes:
      - ../:/home/developer/ros2_ws/src:cached
      - /tmp/.X11-unix:/tmp/.X11-unix
    devices:
      - /dev:/dev
    group_add:
      - dialout
    environment:
      - DISPLAY
      - "QT_X11_NO_MITSHM=1"
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,display
      - ROS_LOG_DIR=/home/developer/ros2_ws/src/logs
      - GZ_SIM_RESOURCE_PATH=/home/developer/ros2_ws/src/ros_gz_crazyflie_bringup/gazebo_files/gazebo
